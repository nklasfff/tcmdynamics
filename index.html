<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mønstrene Bag — En rejse gennem de fem årstider</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- ============================================
         Home Screen — Hub
         ============================================ -->
    <div id="screen-home" class="screen active">
      <div class="hero">
        <img src="Billede 08.10.2025 kl. 16.14.png" alt="Mønstrene Bag" class="hero-img" />
      </div>

      <main class="home-still">
        <!-- Brand -->
        <header class="home-brand-still">
          <h1 class="home-brand-name">mønstrene bag</h1>
          <p class="home-brand-tagline">en rejse gennem de fem årstider</p>
        </header>

        <!-- Intro — hvad er dette -->
        <p class="home-intro-poem" id="home-intro-poem"></p>

        <!-- Årstid med kinesisk tegn som baggrund -->
        <button class="home-season-hero" id="home-season-hero" type="button">
          <span class="home-season-glyph" id="home-season-glyph" aria-hidden="true"></span>
          <span class="home-season-name" id="home-season-name"></span>
          <span class="home-season-meta" id="home-season-meta"></span>
        </button>

        <!-- Kort kontekst om denne årstid -->
        <p class="home-season-context" id="home-season-context"></p>

        <!-- Decorative divider -->
        <div class="home-ornament" aria-hidden="true">· · ·</div>

        <!-- Invitation -->
        <div class="home-question" id="home-question"></div>
      </main>

    </div>

    <!-- ============================================
         Explore Screen — Tre døre
         ============================================ -->
    <div id="screen-explore" class="screen">
      <main class="explore-doors">
        <button class="explore-door" data-explore="seasons">Årstider</button>
        <button class="explore-door" data-explore="organs">Organer</button>
        <button class="explore-door" data-explore="elements">Elementer</button>
      </main>
    </div>

    <!-- Explore sub-screens -->
    <div id="screen-explore-seasons" class="screen">
      <header class="explore-header">
        <button class="back-btn" id="btn-back-explore-seasons">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Udforsk</span>
        </button>
      </header>
      <main class="explore-content">
        <div class="explore-section" id="explore-seasons-list"></div>
      </main>
    </div>

    <div id="screen-explore-organs" class="screen">
      <header class="explore-header">
        <button class="back-btn" id="btn-back-explore-organs">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Udforsk</span>
        </button>
      </header>
      <main class="explore-content">
        <div class="explore-section" id="explore-organs-list"></div>
      </main>
    </div>

    <div id="screen-explore-elements" class="screen">
      <header class="explore-header">
        <button class="back-btn" id="btn-back-explore-elements">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Udforsk</span>
        </button>
      </header>
      <main class="explore-content">
        <div class="explore-section" id="explore-elements-list"></div>
      </main>
    </div>

    <!-- ============================================
         Detail Screens (unchanged)
         ============================================ -->

    <!-- Season Portrait Screen — stille portal til årstiden -->
    <div id="screen-season" class="screen">
      <button class="still-back" id="btn-back-season" aria-label="Tilbage">←</button>

      <main class="season-still">
        <div class="season-hero-still">
          <span class="season-glyph-still" id="season-glyph-still" aria-hidden="true"></span>
          <h1 class="season-name-still" id="season-name-still"></h1>
          <p class="season-meta-still" id="season-meta-still"></p>
        </div>

        <div class="season-welcome-still" id="season-welcome-still"></div>

        <div class="home-ornament" aria-hidden="true">· · ·</div>

        <p class="season-invitation-still">Hvor fører du din opmærksomhed?</p>

        <nav class="season-paths">
          <button class="season-path" data-path="food">Nær dig selv</button>
          <button class="season-path" data-path="movement">Bevæg dig</button>
          <button class="season-path" data-path="stillness">Bliv stille</button>
          <button class="season-path" data-path="reflection">Reflektér</button>
        </nav>
      </main>
    </div>

    <!-- Season Sub-screens — Nær dig selv, Bevæg dig, Bliv stille, Reflektér -->
    <div id="screen-season-food" class="screen">
      <button class="still-back" data-back-to="season" aria-label="Tilbage">←</button>
      <main class="season-sub">
        <p class="season-sub-label" id="sub-food-season"></p>
        <h1 class="season-sub-title">Nær dig selv</h1>
        <p class="season-sub-intro" id="sub-food-intro"></p>
        <div class="season-sub-content" id="sub-food-content"></div>
      </main>
    </div>

    <div id="screen-season-movement" class="screen">
      <button class="still-back" data-back-to="season" aria-label="Tilbage">←</button>
      <main class="season-sub">
        <p class="season-sub-label" id="sub-movement-season"></p>
        <h1 class="season-sub-title">Bevæg dig</h1>
        <p class="season-sub-intro" id="sub-movement-intro"></p>
        <div class="season-sub-content" id="sub-movement-content"></div>
      </main>
    </div>

    <div id="screen-season-stillness" class="screen">
      <button class="still-back" data-back-to="season" aria-label="Tilbage">←</button>
      <main class="season-sub">
        <p class="season-sub-label" id="sub-stillness-season"></p>
        <h1 class="season-sub-title">Bliv stille</h1>
        <p class="season-sub-intro" id="sub-stillness-intro"></p>
        <div class="season-sub-content" id="sub-stillness-content"></div>
      </main>
    </div>

    <div id="screen-season-reflection" class="screen">
      <button class="still-back" data-back-to="season" aria-label="Tilbage">←</button>
      <main class="season-sub">
        <p class="season-sub-label" id="sub-reflection-season"></p>
        <h1 class="season-sub-title">Reflektér</h1>
        <p class="season-sub-intro" id="sub-reflection-intro"></p>
        <div class="season-sub-content" id="sub-reflection-content"></div>
      </main>
    </div>

    <!-- Pattern Result Screen -->
    <div id="screen-pattern" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-pattern">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="pattern-detail-icon">紋</span>
          <h1 id="pattern-detail-title"></h1>
          <p class="detail-nickname" id="pattern-detail-subtitle"></p>
        </div>
      </header>
      <main class="detail-content">
        <div class="pattern-detail-body" id="pattern-detail-body"></div>
      </main>
    </div>

    <!-- Organ Portrait Screen -->
    <div id="screen-organ" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-organ">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="organ-detail-icon"></span>
          <h1 id="organ-detail-name"></h1>
          <p class="detail-nickname" id="organ-detail-nickname"></p>
        </div>
        <div class="detail-meta" id="organ-detail-meta"></div>
      </header>

      <main class="portrait-content">
        <div class="portrait-text" id="organ-description"></div>
        <div class="portrait-links" id="organ-portrait-links"></div>
      </main>
    </div>

    <!-- Organ Themes Screen (Mærk ind) -->
    <div id="screen-organ-themes" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-organ-themes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="organ-themes-icon"></span>
          <h1 id="organ-themes-title"></h1>
        </div>
      </header>
      <main class="portrait-content">
        <div class="themes-flow" id="organ-themes-flow"></div>
        <div class="organ-clock-wisdom" id="organ-themes-clock"></div>
      </main>
    </div>

    <!-- Element Portrait Screen -->
    <div id="screen-element" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-element">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="element-detail-icon"></span>
          <h1 id="element-detail-name"></h1>
          <p class="detail-nickname" id="element-detail-chinese"></p>
        </div>
        <div class="detail-meta" id="element-detail-meta"></div>
      </header>

      <main class="portrait-content">
        <div class="portrait-text" id="element-description"></div>
        <div class="element-organs-nav" id="element-organs-nav"></div>
        <div class="portrait-links" id="element-portrait-links"></div>
      </main>
    </div>

    <!-- Element Cycles Screen -->
    <div id="screen-element-cycles" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-element-cycles">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="element-cycles-icon"></span>
          <h1 id="element-cycles-title"></h1>
        </div>
      </header>
      <main class="portrait-content">
        <div class="cycles-flow" id="element-cycles-flow"></div>
      </main>
    </div>

    <!-- Meridian Detail Screen -->
    <div id="screen-meridian" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-meridian">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="meridian-detail-icon"></span>
          <h1 id="meridian-detail-name"></h1>
          <p class="detail-nickname" id="meridian-detail-nickname"></p>
        </div>
        <div class="detail-meta" id="meridian-detail-meta"></div>
      </header>

      <main class="detail-content">
        <nav class="detail-tabs">
          <button class="tab active" data-tab="m-overview">Overview</button>
          <button class="tab" data-tab="m-pathway">Pathway</button>
          <button class="tab" data-tab="m-keypoints">Key Points</button>
          <button class="tab" data-tab="m-themes">8 Themes</button>
        </nav>

        <div class="tab-content active" id="tab-m-overview">
          <div class="description-text" id="meridian-description"></div>
          <div id="meridian-connections"></div>
        </div>

        <div class="tab-content" id="tab-m-pathway">
          <div id="meridian-pathway"></div>
        </div>

        <div class="tab-content" id="tab-m-keypoints">
          <div class="keypoints-list" id="meridian-keypoints"></div>
        </div>

        <div class="tab-content" id="tab-m-themes">
          <div class="themes-list" id="meridian-themes"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Bottom Navigation — 3 items -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-item active" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Hjem</span>
    </button>
    <button class="bottom-nav-item" data-nav="explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>
      <span>Udforsk</span>
    </button>
    <button class="bottom-nav-item" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Søg</span>
    </button>
  </nav>

  <!-- Top Floating Buttons -->
  <button class="top-float-btn top-float-left" id="hamburger-btn" aria-label="Menu">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>
  <button class="top-float-btn top-float-right" id="search-btn" aria-label="Search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-container">
      <div class="search-input-row">
        <svg class="search-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search organs, elements, meridians..." autocomplete="off" />
        <button class="search-close" id="search-close" aria-label="Close search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-placeholder"></div>
      </div>
    </div>
  </div>

  <!-- Hamburger Menu Overlay -->
  <div class="hamburger-overlay" id="hamburger-overlay">
    <div class="hamburger-menu" id="hamburger-menu">
      <div class="hamburger-header">
        <div class="hamburger-brand">The Patterns Behind</div>
        <button class="hamburger-close" id="hamburger-close" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="hamburger-section">
        <div class="hamburger-section-label" id="menu-label-sections">Sections</div>
        <button class="hamburger-link" data-nav="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </button>
        <button class="hamburger-link" data-nav="practice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          Your Exploration
        </button>
        <button class="hamburger-link" data-nav="seasons">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20"/><circle cx="12" cy="12" r="3"/></svg>
          Your Season
        </button>
        <button class="hamburger-link" data-nav="patterns">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="16" r="3"/><circle cx="16" cy="8" r="3"/><line x1="10.5" y1="9.5" x2="13.5" y2="14.5"/><line x1="13" y1="8" x2="11" y2="8"/></svg>
          Explore Your Patterns
        </button>
        <button class="hamburger-link" data-nav="organs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          The 12 Organs
        </button>
        <button class="hamburger-link" data-nav="elements">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Five Elements & Core Principles
        </button>
        <button class="hamburger-link" data-nav="meridians">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          The 8 Extraordinary Meridians
        </button>
        <button class="hamburger-link" data-nav="overviews">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Overviews
        </button>
      </div>

      <div class="hamburger-section">
        <div class="hamburger-section-label" id="menu-label-info">Information</div>
        <button class="hamburger-link" data-info="about">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          About The Patterns Behind
        </button>
        <button class="hamburger-link" data-info="howto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          How to Use the App
        </button>
      </div>

      <div class="hamburger-section">
        <div class="hamburger-section-label" id="menu-label-appearance">Appearance</div>
        <button class="hamburger-link" id="theme-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span id="theme-label">Switch to light mode</span>
        </button>
      </div>

      <div class="hamburger-section">
        <div class="hamburger-section-label" id="menu-label-language">Language</div>
        <button class="hamburger-link" id="lang-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          <span id="lang-label">Dansk</span>
        </button>
      </div>

    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
