<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mønstrene Bag — TCM i Praksis</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Home Screen -->
    <div id="screen-home" class="screen active">
      <header class="home-header">
        <div class="brand">
          <div class="brand-mark">MB</div>
          <h1 class="brand-title">Mønstrene Bag</h1>
          <p class="brand-subtitle">Traditionel Kinesisk Medicin i Praksis</p>
        </div>
      </header>

      <main class="home-content">
        <section class="home-section" id="nav-organs">
          <div class="section-header">
            <span class="section-number">01</span>
            <h2>De 12 Organer</h2>
            <p class="section-desc">Meridianer & Organsystemer</p>
          </div>
          <div class="organ-grid" id="organ-grid">
            <!-- Generated by JS -->
          </div>
        </section>

        <section class="home-section" id="nav-extraordinary">
          <div class="section-header">
            <span class="section-number">02</span>
            <h2>De 8 Ekstraordinære</h2>
            <p class="section-desc">Dybere Energisystemer</p>
          </div>
          <div class="meridian-grid" id="meridian-grid">
            <!-- Generated by JS -->
          </div>
        </section>

        <section class="home-section" id="nav-clock">
          <div class="section-header">
            <span class="section-number">03</span>
            <h2>Organuret</h2>
            <p class="section-desc">24-timers Qi-cyklus</p>
          </div>
          <div class="clock-container" id="organ-clock">
            <!-- Generated by JS -->
          </div>
        </section>

        <section class="home-section" id="nav-elements">
          <div class="section-header">
            <span class="section-number">04</span>
            <h2>Fem Elementer</h2>
            <p class="section-desc">Træ · Ild · Jord · Metal · Vand</p>
          </div>
          <div class="elements-grid" id="elements-grid">
            <!-- Generated by JS -->
          </div>
        </section>
      </main>

      <footer class="home-footer">
        <p class="footer-text">Anne Marie Clement</p>
      </footer>
    </div>

    <!-- Organ Detail Screen -->
    <div id="screen-organ" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-organ">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Tilbage</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="organ-detail-icon"></span>
          <h1 id="organ-detail-name"></h1>
          <p class="detail-nickname" id="organ-detail-nickname"></p>
        </div>
        <div class="detail-meta" id="organ-detail-meta"></div>
      </header>

      <main class="detail-content">
        <nav class="detail-tabs">
          <button class="tab active" data-tab="overview">Overblik</button>
          <button class="tab" data-tab="themes">8 Temaer</button>
          <button class="tab" data-tab="keypoints">Nøglepunkter</button>
        </nav>

        <div class="tab-content active" id="tab-overview">
          <div class="description-text" id="organ-description"></div>
        </div>

        <div class="tab-content" id="tab-themes">
          <div class="themes-list" id="organ-themes"></div>
        </div>

        <div class="tab-content" id="tab-keypoints">
          <div class="keypoints-list" id="organ-keypoints"></div>
        </div>
      </main>
    </div>

    <!-- Meridian Detail Screen -->
    <div id="screen-meridian" class="screen">
      <header class="detail-header">
        <button class="back-btn" id="btn-back-meridian">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Tilbage</span>
        </button>
        <div class="detail-title-area">
          <span class="detail-icon" id="meridian-detail-icon"></span>
          <h1 id="meridian-detail-name"></h1>
          <p class="detail-nickname" id="meridian-detail-nickname"></p>
        </div>
        <div class="detail-meta" id="meridian-detail-meta"></div>
      </header>

      <main class="detail-content">
        <nav class="detail-tabs">
          <button class="tab active" data-tab="m-overview">Overblik</button>
          <button class="tab" data-tab="m-themes">8 Temaer</button>
        </nav>

        <div class="tab-content active" id="tab-m-overview">
          <div class="description-text" id="meridian-description"></div>
        </div>

        <div class="tab-content" id="tab-m-themes">
          <div class="themes-list" id="meridian-themes"></div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
